volumes:
  production_traefik: {}
  hf_cache: {}

services:
  shinyapp:
    build:
      context: .
      dockerfile: ./compose/production/shiny/Dockerfile
    image: tfbpshiny_production_app
    environment:
      - HF_HOME=/hf-cache
      - HF_TOKEN
      - DOCKER_ENV
      - TFBPSHINY_LOG_HANDLER=console
      - TFBPSHINY_PROFILE_HANDLER=console
    volumes:
      - hf_cache:/hf-cache
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      # Main site
      - "traefik.http.routers.shinyapp.rule=Host(`tfbindingandperturbation.com`) || Host(`www.tfbindingandperturbation.com`)"
      - "traefik.http.routers.shinyapp.entrypoints=web-secure"
      - "traefik.http.routers.shinyapp.tls=true"
      - "traefik.http.routers.shinyapp.tls.certresolver=letsencrypt"
      - "traefik.http.services.shinyapp.loadbalancer.server.port=8000"
    networks:
      - web
    logging:
      driver: awslogs
      options:
        awslogs-group: /tfbpshiny/production
        awslogs-region: us-east-2
        awslogs-stream: shinyapp
        awslogs-create-group: "true"
    restart: unless-stopped

  traefik:
    build:
      context: .
      dockerfile: ./compose/production/traefik/Dockerfile
    image: tfbpshiny_production_traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - production_traefik:/etc/traefik/acme
    labels:
      - "traefik.enable=true"
      # Traefik dashboard — protected by basic auth
      - "traefik.http.routers.dashboard.rule=Host(`shinytraefik.tfbindingandperturbation.com`)"
      - "traefik.http.routers.dashboard.entrypoints=web-secure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_PASSWORD_HASH}"
    networks:
      - web
    logging:
      driver: awslogs
      options:
        awslogs-group: /tfbpshiny/production
        awslogs-region: us-east-2
        awslogs-stream: traefik
        awslogs-create-group: "true"
    restart: unless-stopped

networks:
  web:
    external: false
